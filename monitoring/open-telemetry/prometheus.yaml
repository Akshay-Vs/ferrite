global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'ferrite-otel-collector'
    static_configs:
      - targets: ['ferrite-otel-collector:8888']

  - job_name: ferrite-postgres
    static_configs:
      - targets: ["ferrite-postgres-exporter:9187"]
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: "pg_.*"
        action: keep

  - job_name: ferrite-redis-cache
    static_configs:
      - targets: ["ferrite-redis-exporter:9121"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: "([^:]+)(:[0-9]+)?"
        replacement: "$1"

  - job_name: ferrite-redis-sessions-exporter
    static_configs:
      - targets: ["ferrite-redis-sessions-exporter:9121"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: "([^:]+)(:[0-9]+)?"
        replacement: "$1"
