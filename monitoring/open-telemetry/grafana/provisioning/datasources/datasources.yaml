apiVersion: 1
datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    url: http://ferrite-prometheus:9090
    isDefault: true
    editable: true

  - name: PostgreSQL
    type: postgres
    uid: postgres
    url: ferrite-postgres:5432
    user: ${POSTGRES_USER}
    secureJsonData:
      password: ${POSTGRES_PASSWORD}
    jsonData:
      database: ${POSTGRES_DB}
      sslmode: disable

  - name: Loki
    type: loki
    uid: loki
    url: http://ferrite-loki:3100
    editable: true
    jsonData:
      derivedFields:
        - name: TraceID
          matcherRegex: '"traceId":"([a-f0-9]+)"'
          url: '${__value.raw}'
          datasourceUid: jaeger
          urlDisplayLabel: 'View Trace in Jaeger'

  - name: Jaeger
    type: jaeger
    uid: jaeger
    url: http://ferrite-jaeger:16686
    editable: true
    jsonData:
      tracesToLogsV2:
        datasourceUid: loki
        spanStartTimeShift: '-1m'
        spanEndTimeShift: '1m'
        filterByTraceID: true
        filterBySpanID: false
        customQuery: true
        query: '{app="app"} | json | traceId=`${__trace.traceId}`'
      tracesToMetrics:
        datasourceUid: prometheus
        spanStartTimeShift: '-1m'
        spanEndTimeShift: '1m'
        queries:
          - name: 'Request rate'
            query: 'rate(http.server.request.duration{$$__tags}[5m])'
          - name: 'Error rate'
            query: 'rate(http.server.request.duration{$$__tags, http_status_code=~"5.."}[5m])'
      traceQuery:
        timeShiftEnabled: true
        spanStartTimeShift: '-1m'
        spanEndTimeShift: '1m'
      spanBar:
        type: Tag
        tag: 'http.target'
